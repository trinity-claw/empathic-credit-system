services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build: .
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      REDIS_URL: redis://redis:6379/0
      DATABASE_URL: sqlite:///./data/ecs.db
    volumes:
      - ./data:/app/data
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 3

  worker:
    build: .
    command: uv run rq worker credit_eval --url redis://redis:6379/0
    env_file: .env
    environment:
      REDIS_URL: redis://redis:6379/0
      DATABASE_URL: sqlite:///./data/ecs.db
    volumes:
      - ./data:/app/data
    depends_on:
      redis:
        condition: service_healthy

  dashboard:
    build: .
    command: uv run streamlit run streamlit_app.py --server.port=8501 --server.address=0.0.0.0
    ports:
      - "8501:8501"
    volumes:
      - ./data:/app/data
      - ./models:/app/models
    depends_on:
      - api
